<!DOCTYPE html>
<html>
<head>
    <title>Grammarly AI Clone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <h1>🧠 Grammarly AI Clone</h1>

    <div class="container">

        <div class="left">
            <h3>Input</h3>
            <textarea id="inputText" placeholder="Type your text..."></textarea>

            <button onclick="analyze()">Analyze</button>
        </div>

        <div class="right">
            <h3>Corrected Output</h3>
            <div id="output"></div>

            <div class="stats">
                <p>❌ Wrong: <span id="wrong"></span></p>
                <p>✅ Correct: <span id="correct"></span></p>
                <p>📊 Total: <span id="total"></span></p>
                <p>🧠 Score: <span id="score"></span>/100</p>
            </div>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
