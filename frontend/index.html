<!DOCTYPE html>
<html>
<head>
    <title>AI Typo Corrector Ultra</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <div class="header">
        <h1>AI Typo Corrector Ultra</h1>
        <p>Fix grammar, spelling & improve writing instantly</p>
    </div>

    <div class="container">

        <div class="left">
            <h3>Input</h3>
            <textarea id="input" placeholder="Type your text here..."></textarea>

            <button onclick="correctText()">Correct Text</button>
        </div>
        <div class="container">
  <div class="editor">
    <textarea id="inputText" placeholder="Start typing..."></textarea>
  </div>

  <div class="result">
    <h3>Corrected</h3>
    <div id="output"></div>

    <div class="stats">
      <p>❌ Wrong: <span id="wrong"></span></p>
      <p>✅ Correct: <span id="correct"></span></p>
      <p>📊 Total: <span id="total"></span></p>
      <p>🧠 Score: <span id="score"></span>/100</p>
    </div>
  </div>
</div>

<button onclick="analyze()">Analyze</button>

        <div class="right">
            <h3>Output</h3>
            <div id="output">Your corrected text will appear here...</div>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
